name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
      env:
        SAUCEDEMO_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}
        SAUCEDEMO_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}
        PRACTICE_USERNAME: ${{ secrets.PRACTICE_USERNAME }}
        PRACTICE_PASSWORD: ${{ secrets.PRACTICE_PASSWORD }}
        EVENTHUB_EMAIL: ${{ secrets.EVENTHUB_EMAIL }}
        EVENTHUB_PASSWORD: ${{ secrets.EVENTHUB_PASSWORD }}


    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
